version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
      - postgres_data:/var/lib/postgresql/data

  backend_user:
    build: ./backend_User
    container_name: backend-user
    restart: always
    depends_on:
      - postgres
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: userdb
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3001:3001"

  backend_product:
    build: ./backend_Product
    container_name: backend-product
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "3002:3002"

  backend_order:
    build: ./backend_Order
    container_name: backend-order
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "3003:3003"

  gateway:
    build: ./gateway
    container_name: api-gateway
    restart: always
    depends_on:
      - backend_user
      - backend_product
      - backend_order
    ports:
      - "3000:3000"

volumes:
  postgres_data: