# monitoring/helm/values.yaml

grafana:
  enabled: true

  adminPassword: "Nhom_DevOps_123!"

  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 15d

    storageSpec: {}

alertmanager:
  enabled: true

  alertmanagerSpec:
    secrets:
      - alertmanager-slack-secret

  config:
    global:
      resolve_timeout: 5m

      slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/SLACK_WEBHOOK_URL # "https://hooks.slack.com/services/XXX/YYY/ZZZ"

    route:
      group_by:
        - alertname
        - severity
        - job

      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h

      receiver: "slack-default"

      routes:
        - match:
            severity: critical
          receiver: "slack-critical"

        - match:
            severity: warning
          receiver: "slack-warning"

    receivers:
      - name: "slack-default"

        slack_configs:
          - channel: "#monitoring"

            send_resolved: true

            title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Mô tả:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-critical"

        slack_configs:
          - channel: "#alerts-critical"

            send_resolved: true

            title: ":red_circle: CRITICAL: {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Chi tiết:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-warning"

        slack_configs:
          - channel: "#alerts-warning"

            send_resolved: true

            title: ":warning: WARNING: {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Chi tiết:* {{ .Annotations.description }}
              {{ end }}

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true