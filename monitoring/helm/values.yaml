# monitoring/helm/values.yaml

grafana:
  enabled: true

  adminPassword: "Nhom_DevOps_123!"

  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 15d

    storageSpec: {}

    # Scrape thêm Node Exporter ngoài Kubernetes
    additionalScrapeConfigs:
      - job_name: "ansible-node-exporter"

        static_configs:
          - targets:
              - "<EC2-IP-1>:9100" # cần thay IP thật
              - "<EC2-IP-2>:9100" # cần thay IP thật

        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

          - target_label: job
            replacement: ansible-node-exporter

alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m

      # Slack Webhook URL
      slack_api_url: "${SLACK_WEBHOOK_URL}" # "https://hooks.slack.com/services/XXX/YYY/ZZZ"

    route:
      group_by:
        - alertname
        - severity
        - job

      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h

      receiver: "slack-default"

      routes:
        - match:
            severity: critical
          receiver: "slack-critical"

        - match:
            severity: warning
          receiver: "slack-warning"

    receivers:
      - name: "slack-default"

        slack_configs:
          - channel: "#monitoring"

            send_resolved: true

            title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Mô tả:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-critical"

        slack_configs:
          - channel: "#alerts-critical"

            send_resolved: true

            title: ":red_circle: CRITICAL: {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Chi tiết:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-warning"

        slack_configs:
          - channel: "#alerts-warning"

            send_resolved: true

            title: ":warning: WARNING: {{ .GroupLabels.alertname }}"

            text: |
              {{ range .Alerts }}
              *Service:* {{ .Labels.job }}
              *Chi tiết:* {{ .Annotations.description }}
              {{ end }}

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true