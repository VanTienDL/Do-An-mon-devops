# monitoring/service-monitors/service-monitors.yaml

# --- Order Service (Flask/Python) ---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service-monitor
  namespace: monitoring
  labels:
    release: monitoring       # Khớp với Helm release name ở Giai đoạn 2
spec:
  selector:
    matchLabels:
      app: order              # Khớp với label trong k8s-yaml/backend-order.yaml
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http              # Khớp với name: http đã thêm vào Service
      path: /metrics
      interval: 15s
---
# --- Product Service (Java/Spring Boot) ---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: product-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: product            # Khớp với label trong k8s-yaml/backend-product.yaml
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus    # Spring Boot Actuator endpoint
      interval: 15s
---
# --- User Service (Node.js/Express) ---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: user               # Khớp với label trong k8s-yaml/backend-user.yaml
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
# --- Gateway Service (Node.js/Express) ---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: gateway            # Khớp với label trong k8s-yaml/gateway.yaml (sau khi sửa lỗi)
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s