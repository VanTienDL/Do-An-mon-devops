# monitoring/alert-rules/alert-rules.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: microservices-alerts
  namespace: monitoring
  labels:
    release: monitoring       # Phải khớp với Helm release name
spec:
  groups:

    # --- Nhóm 1: Availability của 4 services ---
    - name: microservices.availability
      rules:

        - alert: ServiceDown
          expr: up{job=~"order-service|product-service|user-service|gateway-service"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} bị DOWN"
            description: >
              Service {{ $labels.job }} mất kết nối hơn 1 phút.
              Kiểm tra pod: kubectl get pods -n default | grep {{ $labels.job }}

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
            * 100 > 5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Error rate cao trên {{ $labels.job }}"
            description: >
              Error rate (5xx) của {{ $labels.job }} vượt 5%
              trong 2 phút liên tiếp.

        - alert: GatewayHighErrorRate
          expr: |
            sum(rate(gateway_http_requests_total{status_code=~"5.."}[5m])) by (target_service)
            /
            sum(rate(gateway_http_requests_total[5m])) by (target_service)
            * 100 > 5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Gateway error rate cao khi proxy đến {{ $labels.target_service }}"
            description: >
              Gateway đang gặp > 5% lỗi khi proxy đến {{ $labels.target_service }}.

        - alert: HighP95Latency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[5m]))
              by (le, job)
            ) > 1
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Latency P95 cao trên {{ $labels.job }}"
            description: >
              P95 latency của {{ $labels.job }} vượt 1 giây
              trong 3 phút liên tiếp.

        - alert: GatewayProxyErrors
          expr: rate(gateway_proxy_errors_total[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Gateway đang có proxy errors đến {{ $labels.target_service }}"
            description: >
              Phát hiện proxy error liên tục từ Gateway đến {{ $labels.target_service }}.

    # --- Nhóm 2: Tài nguyên Kubernetes ---
    - name: kubernetes.resources
      rules:

        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="default"}[15m]) > 3
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} đang crash loop"
            description: >
              Pod {{ $labels.pod }} đã restart hơn 3 lần trong 15 phút.
              Kiểm tra logs: kubectl logs {{ $labels.pod }} -n default --previous

        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="default", container!=""}
            /
            container_spec_memory_limit_bytes{namespace="default", container!=""}
            * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.pod }} sử dụng memory > 85%"
            description: >
              Container {{ $labels.container }} trong pod {{ $labels.pod }}
              đang dùng hơn 85% memory limit trong 5 phút.

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="default", condition="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} không ở trạng thái Ready"
            description: >
              Pod {{ $labels.pod }} không Ready trong hơn 2 phút.

    # --- Nhóm 3: EC2 nodes (Ansible node_exporter) ---
    - name: ansible.nodes
      rules:

        - alert: AnsibleNodeHighCPU
          expr: |
            100 - (avg by (instance)
              (rate(node_cpu_seconds_total{job="ansible-node-exporter", mode="idle"}[5m]))
            * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "EC2 node {{ $labels.instance }} CPU > 80%"
            description: >
              Node {{ $labels.instance }} đang dùng hơn 80% CPU
              trong 5 phút. Kiểm tra tiến trình đang chạy trên node.

        - alert: AnsibleNodeDown
          expr: up{job="ansible-node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "EC2 node {{ $labels.instance }} không phản hồi"
            description: >
              Node_exporter trên {{ $labels.instance }} không phản hồi
              hơn 2 phút. Node có thể đã bị tắt hoặc mất kết nối.