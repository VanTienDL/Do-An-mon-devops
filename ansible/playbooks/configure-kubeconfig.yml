---
- name: Configure kubeconfig for EKS
  hosts: mgmt_host
  gather_facts: true
  become: false

  vars:
    kubeconfig_cluster_name: "{{ eks_cluster_name | default(cluster_name | default('', true), true) }}"
    kubeconfig_path: "{{ ansible_env.HOME }}/.kube/config"

  tasks:
    - name: Validate EKS variables
      ansible.builtin.assert:
        that:
          - aws_region is defined
          - aws_region | length > 0
          - kubeconfig_cluster_name | length > 0
        fail_msg: "Set aws_region and cluster_name, or pass -e 'cluster_name=<eks-name> aws_region=<region>'."

    - name: Ensure kubeconfig directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_path | dirname }}"
        state: directory
        mode: "0700"

    - name: Check AWS caller identity
      ansible.builtin.command:
        argv:
          - aws
          - sts
          - get-caller-identity
      register: aws_identity
      changed_when: false

    - name: Update kubeconfig for EKS cluster
      ansible.builtin.command:
        argv:
          - aws
          - eks
          - update-kubeconfig
          - --region
          - "{{ aws_region }}"
          - --name
          - "{{ kubeconfig_cluster_name }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - --alias
          - "{{ kubeconfig_context_alias | default(kubeconfig_cluster_name, true) }}"
      register: update_kubeconfig
      changed_when: "'Updated context' in update_kubeconfig.stderr or 'Added new context' in update_kubeconfig.stderr"

    - name: Show current kubectl context
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - current-context
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: kubectl_context
      changed_when: false

    - name: Verify Kubernetes cluster access
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - nodes
          - --request-timeout=30s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: kubectl_nodes
      changed_when: false

    - name: Show kubeconfig verification result
      ansible.builtin.debug:
        msg:
          - "AWS identity: {{ aws_identity.stdout }}"
          - "Current context: {{ kubectl_context.stdout }}"
          - "{{ kubectl_nodes.stdout_lines }}"
